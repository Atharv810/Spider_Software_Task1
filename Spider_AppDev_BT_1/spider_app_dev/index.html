<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Number Game</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <div class="container">

        <h1>Spider Number Game</h1>

        <div class="lives">
            <p>Lives Remaining: </p>
            <p>You ❤️: <span id="userLives">3</span></p>
            <p>Bot 1 🤖: <span id="bot1Lives">3</span></p>
            <p>Bot 2 🤖: <span id="bot2Lives">3</span></p>
        </div>

        <input
            type="number"
            id="userInput"
            min="0"
            max="100"
            placeholder="Enter a number (0-100)"
        >

        <button id="submitBtn">Submit</button>

        <div id="result"></div>

    </div>

    <script src="./script.js"></script>

</body>
</html>
